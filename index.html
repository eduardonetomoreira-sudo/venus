<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADECE — Subsídios Econômicos</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --amarelo:#f5c518;--amarelo-e:#c99f00;
  --branco:#ffffff;--bg:#f2f5f3;--bg2:#e6ede8;
  --cinza:#dde4df;--cinza-t:#506860;--txt:#0d1f16;
  --r:10px;--rl:16px;
}
.c-nks{--ec:#1a4731;--ec-m:#246040;--ec-c:#2e7a51;--ec-s:#e8f2ed;--ec-b:#b8d8c8;--ec-av:#f5c518;--ec-avt:#1a4731;--ec-p1:#2e7a51;--ec-p2:#f5c518}
.c-mrs{--ec:#1a4731;--ec-m:#246040;--ec-c:#2e7a51;--ec-s:#e8f2ed;--ec-b:#b8d8c8;--ec-av:#f5c518;--ec-avt:#1a4731;--ec-p1:#2e7a51;--ec-p2:#f5c518}
.c-mallei{--ec:#1a4731;--ec-m:#246040;--ec-c:#2e7a51;--ec-s:#e8f2ed;--ec-b:#b8d8c8;--ec-av:#f5c518;--ec-avt:#1a4731;--ec-p1:#2e7a51;--ec-p2:#f5c518}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* HEADER */
.hdr{background:#009aaa;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.25)}
.hdr-in{max-width:1180px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:16px;height:72px}
.logo-img{height:52px;width:auto;display:block;flex-shrink:0;border-radius:7px}
.hdr-sep{width:1px;height:36px;background:rgba(255,255,255,.3);flex-shrink:0}
.hdr-t b{font-size:17px;font-weight:700;color:#fff;display:block;letter-spacing:-.2px}
.hdr-t small{font-size:12.5px;color:rgba(255,255,255,.65)}
.hdr-nav{display:flex;gap:4px;background:rgba(255,255,255,.12);border-radius:20px;padding:4px 5px;margin-left:10px}
.hnav{padding:6px 16px;border-radius:16px;border:none;font-size:13px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;color:rgba(255,255,255,.7);background:transparent;transition:all .18s}
.hnav:hover{color:#fff;background:rgba(255,255,255,.18)}
.hnav.on{background:var(--amarelo);color:#0d1f16}
.hdr-act{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:8px 15px;border-radius:var(--r);font-size:13px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-sec{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22)}
.btn-sec:hover{background:rgba(255,255,255,.24)}
.btn-pri{background:var(--amarelo);color:#0d1f16;border:none}
.btn-pri:hover{background:#e8b800}
.btn:active{transform:scale(.97)}
label.btn{cursor:pointer}

/* MAIN */
.main{max-width:1180px;margin:0 auto;padding:36px 28px 80px}

/* EMPRESA */
.emp-sec{margin-bottom:60px;scroll-margin-top:84px}
.emp-hdr{background:var(--ec);border-radius:var(--rl) var(--rl) 0 0;padding:26px 32px;display:flex;align-items:center;gap:20px}
.emp-av{width:56px;height:56px;border-radius:50%;background:var(--ec-av);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--ec-avt);flex-shrink:0}
.emp-hdr-info{flex:1}
.emp-hdr-nome{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px}
.emp-hdr-sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:3px}
.emp-pct{background:var(--ec-av);color:var(--ec-avt);padding:8px 20px;border-radius:20px;font-size:16px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap}
.emp-body{background:var(--branco);border:1px solid var(--cinza);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:30px 32px}

/* META */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px;margin-bottom:28px}
.mf{background:var(--bg);border:1px solid var(--cinza);border-radius:var(--r);padding:13px 17px}
.mf-lbl{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-t);margin-bottom:7px}
.mf input,.mf select{width:100%;border:none;outline:none;font-size:16px;font-weight:500;color:var(--txt);background:transparent;font-family:'Sora',sans-serif}
.mf input::placeholder{color:#b5c0bb;font-weight:400}

/* CONTRATO */
.contrato{background:var(--ec-s,#e8f2ed);border:1px solid var(--ec-b,#b8d8c8);border-left:4px solid var(--ec,#1a4731);border-radius:var(--r);padding:18px 22px;display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.contrato-ico{width:40px;height:40px;border-radius:9px;background:var(--ec,#1a4731);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.contrato-ico svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2}
.contrato-body{flex:1;min-width:240px}
.contrato-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ec,#1a4731);margin-bottom:9px}
.contrato-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.di{border:1px solid var(--cinza);border-radius:7px;padding:6px 12px;font-size:15px;font-weight:500;color:var(--txt);font-family:'Sora',sans-serif;background:var(--branco);outline:none}
.di:focus{border-color:var(--ec-c,#2e7a51)}
.oi{flex:1;min-width:140px;border:1px solid var(--cinza);border-radius:7px;padding:6px 12px;font-size:14px;color:var(--txt);font-family:'Sora',sans-serif;background:var(--branco);outline:none}
.oi:focus{border-color:var(--ec-c,#2e7a51)}
.oi::placeholder{color:#b5c0bb}

/* STATUS BADGE */
.sb{font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;cursor:pointer;border:none;font-family:'Sora',sans-serif;letter-spacing:.02em;transition:opacity .15s;white-space:nowrap}
.sb:hover{opacity:.75}
.sp{background:#e4e2dc;color:#4a4843}
.sa{background:#fff3cd;color:#7a5800}
.sd{background:#d0edda;color:#155926}
.sb2{background:#fde8e8;color:#8b1a1a}

/* PROGRESSO */
.prog{margin-bottom:26px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cinza-t)}
.prog-num{font-size:17px;font-weight:700;color:var(--ec,#1a4731);font-family:'DM Mono',monospace}
.prog-track{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ec-p1,#2e7a51),var(--ec-p2,#f5c518));transition:width .4s cubic-bezier(.4,0,.2,1)}

/* LEGENDA */
.leg{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:26px}
.li{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--cinza-t)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* OBSERVAÇÕES */
.obs-sec{background:var(--ec-s,#e8f2ed);border:1px solid var(--ec-b,#b8d8c8);border-left:4px solid var(--ec,#1a4731);border-radius:var(--r);padding:18px 22px;margin-bottom:28px}
.obs-sec-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ec,#1a4731);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.obs-sec-lbl svg{width:15px;height:15px;stroke:var(--ec,#1a4731);fill:none;stroke-width:2.2;flex-shrink:0}
.obs-sec textarea{width:100%;border:1px solid var(--ec-b,#b8d8c8);border-radius:8px;padding:12px 14px;font-size:15px;font-family:'Sora',sans-serif;color:var(--txt);background:var(--branco);resize:vertical;min-height:88px;outline:none;line-height:1.7}
.obs-sec textarea:focus{border-color:var(--ec,#1a4731)}
.obs-sec textarea::placeholder{color:#b5c0bb}

/* PARCELAS TABS */
.ptabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.ptab{padding:7px 18px;font-size:14px;font-weight:600;border:1.5px solid var(--cinza);border-radius:20px;background:var(--branco);cursor:pointer;font-family:'Sora',sans-serif;color:var(--cinza-t);transition:all .15s}
.ptab:hover{border-color:var(--ec-c,#2e7a51);color:var(--ec-c,#2e7a51)}
.ptab.on{background:var(--amarelo);color:#0d1f16;border-color:var(--amarelo-e);font-weight:700}
.ppanel{display:none}.ppanel.on{display:block}

/* PARCELA CARD */
.p-card{background:var(--bg);border:1px solid var(--cinza);border-radius:var(--rl);overflow:hidden}
.p-card-hdr{background:var(--ec-s,#e8f2ed);border-bottom:1px solid var(--ec-b,#b8d8c8);padding:15px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.p-card-titulo{font-size:15px;font-weight:700;color:var(--ec,#1a4731);text-transform:uppercase;letter-spacing:.04em}
.p-card-valor{font-size:14.5px;font-weight:600;color:var(--ec-m,#246040);font-family:'DM Mono',monospace}
.p-card-body{padding:18px 22px;display:flex;flex-direction:column;gap:12px}

/* ETAPA */
.etapa-row{background:var(--branco);border:1px solid var(--cinza);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.etapa-row:hover{border-color:var(--ec-b,#b8d8c8)}
.etapa-row.st-d{border-left:4px solid #3aaa5c}
.etapa-row.st-a{border-left:4px solid var(--amarelo)}
.etapa-row.st-b{border-left:4px solid #e05252}
.etapa-row.st-p{border-left:4px solid #c8cdc9}
.etapa-top{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer}
.etapa-num{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--cinza);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--cinza-t);flex-shrink:0}
.etapa-nome{font-size:15px;font-weight:500;color:var(--txt);flex:1}
.etapa-date{border:1px solid var(--cinza);border-radius:7px;padding:5px 10px;font-size:13.5px;font-family:'DM Mono',monospace;color:var(--cinza-t);background:var(--bg);outline:none;width:145px}
.etapa-date:focus{border-color:var(--ec-c,#2e7a51)}
.chev{font-size:13px;color:var(--cinza-t);transition:transform .2s;padding:0 4px;user-select:none}
.etapa-row.open .chev{transform:rotate(180deg)}
.etapa-body{display:none;padding:0 18px 14px 56px;border-top:1px solid var(--bg2)}
.etapa-row.open .etapa-body{display:block}
.etapa-body textarea{width:100%;border:1px solid var(--cinza);border-radius:7px;padding:9px 12px;font-size:14px;font-family:'Sora',sans-serif;color:var(--txt);background:var(--bg);resize:vertical;min-height:56px;outline:none;margin-top:10px;line-height:1.6}
.etapa-body textarea:focus{border-color:var(--ec-c,#2e7a51)}
.etapa-body textarea::placeholder{color:#b5c0bb}

/* DIVIDER */
.div-emp{border:none;border-top:2px dashed var(--cinza);margin:0 0 60px;opacity:.4}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#009aaa;color:#fff;padding:12px 24px;border-radius:var(--r);font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
@media print{.hdr{position:static}.btn,.hdr-nav{display:none}.emp-sec{page-break-before:always}.ppanel{display:block!important}.etapa-body{display:block!important}}
</style>
</head>

function sbcls(st){return{p:'sp',a:'sa',d:'sd',b:'sb2'}[st]}
function toggleEt(id){const el=document.getElementById(id);if(el)el.classList.toggle('open')}
function switchP(eid,p){document.querySelectorAll('#ptabs-'+eid+' .ptab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('#pps-'+eid+' .ppanel').forEach(t=>t.classList.remove('on'));const tab=document.getElementById('ptab-'+eid+'-'+p);const pp=document.getElementById('pp-'+eid+'-'+p);if(tab)tab.classList.add('on');if(pp)pp.classList.add('on')}
function rebuildBody(eid){const b=document.getElementById('ebody-'+eid);if(b){b.innerHTML=buildBody(eid);updProg(eid)}}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function buildBody(eid){
  const s=S[eid];const np=s.nparcelas;let h='';
  h+=`<div class="meta-grid">
    <div class="mf"><div class="mf-lbl">N.\u00ba do processo</div><input type="text" placeholder="Ex.: NUP 56012.000000/2025-00" value="${x(s.nproc)}" onchange="S['${eid}'].nproc=this.value;as()"></div>
    <div class="mf"><div class="mf-lbl">Valor total contratado</div><input type="text" placeholder="R$ 0,00" value="${x(s.valor)}" onchange="S['${eid}'].valor=this.value;as()"></div>
    <div class="mf"><div class="mf-lbl">Qtd. parcelas previstas</div><select onchange="S['${eid}'].nparcelas=+this.value;rebuildBody('${eid}')">${Array.from({length:8},(_,i)=>i+1).map(n=>`<option value="${n}"${n===np?' selected':''}>${n} parcela${n>1?'s':''}</option>`).join('')}</select></div>
    <div class="mf"><div class="mf-lbl">Valor de cada parcela</div><input type="text" placeholder="R$ 0,00" value="${x(s.vparcela||'')}" onchange="S['${eid}'].vparcela=this.value;as()"></div>
  </div>`;
  h+=`<div class="contrato"><div class="contrato-ico"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div class="contrato-body"><div class="contrato-lbl">Assinatura do contrato</div><div class="contrato-row"><input class="di" type="date" value="${s.contrato.date}" onchange="S['${eid}'].contrato.date=this.value;as()"><button class="sb ${sbcls(s.contrato.status)}" id="cbadge-${eid}" onclick="cycleContrato('${eid}',this)">${SL[s.contrato.status]}</button><input class="oi" type="text" placeholder="Observa\u00e7\u00e3o sobre o contrato..." value="${x(s.contrato.obs||'')}" onchange="S['${eid}'].contrato.obs=this.value;as()"></div></div></div>`;
  h+=`<div class="prog"><div class="prog-top"><span class="prog-lbl">Progresso geral</span><span class="prog-num" id="pn-${eid}">0%</span></div><div class="prog-track"><div class="prog-fill" id="pf-${eid}" style="width:0%"></div></div></div>`;
  h+=`<div class="leg"><div class="li"><div class="ld" style="background:#c8cdc9"></div>Pendente</div><div class="li"><div class="ld" style="background:#f5c518"></div>Em andamento</div><div class="li"><div class="ld" style="background:#3aaa5c"></div>Conclu\u00eddo</div><div class="li"><div class="ld" style="background:#e05252"></div>Bloqueado</div></div>`;
  h+=`<div class="obs-sec"><div class="obs-sec-lbl"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Observa\u00e7\u00f5es gerais</div><textarea placeholder="Anota\u00e7\u00f5es gerais sobre o processo..." onchange="S['${eid}'].obs=this.value;as()">${x(s.obs||'')}</textarea></div>`;
  h+=`<div class="ptabs" id="ptabs-${eid}">`;
  for(let p=1;p<=np;p++) h+=`<button class="ptab${p===1?' on':''}" id="ptab-${eid}-${p}" onclick="switchP('${eid}',${p})">Parcela ${p}</button>`;
  h+=`</div><div id="pps-${eid}">`;
  for(let p=1;p<=np;p++){
    const vp=s.vparcela||'\u2014';
    h+=`<div class="ppanel${p===1?' on':''}" id="pp-${eid}-${p}"><div class="p-card"><div class="p-card-hdr"><span class="p-card-titulo">Parcela ${p} de ${np}</span><span class="p-card-valor">${vp}</span></div><div class="p-card-body">`;
    etList(p).forEach((e,i)=>{
      const es=ge(eid,e.id);const cid='et-'+eid+'-'+e.id;
      h+=`<div class="etapa-row st-${es.status}" id="${cid}"><div class="etapa-top" onclick="toggleEt('${cid}')"><div class="etapa-num">${i+1}</div><span class="etapa-nome">${e.nome}</span><input class="etapa-date" type="date" value="${es.date}" onclick="event.stopPropagation()" onchange="ge('${eid}','${e.id}').date=this.value;as()"><button class="sb ${sbcls(es.status)}" id="badge-${eid}-${e.id}" onclick="event.stopPropagation();cycleStatus('${eid}','${e.id}',this)">${SL[es.status]}</button><span class="chev">\u25be</span></div><div class="etapa-body"><textarea placeholder="Documentos, observa\u00e7\u00f5es, respons\u00e1vel pela etapa..." onchange="ge('${eid}','${e.id}').obs=this.value;as()">${es.obs}</textarea></div></div>`;
    });
    h+=`</div></div></div>`;
  }
  h+=`</div>`;return h;
}
function exportarJSON(){const d=new Date().toISOString().slice(0,10);const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ADECE_dados_'+d+'.json';a.click();URL.revokeObjectURL(url);const t=document.getElementById('toast');t.textContent='\u2713 Backup salvo: ADECE_dados_'+d+'.json';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>{t.classList.remove('show');t.textContent='\u2713 Dados salvos com sucesso'},3000)}
function importarJSON(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const imported=JSON.parse(e.target.result);if(!EMPS.some(emp=>imported[emp.id])){alert('Arquivo inv\u00e1lido.');return}EMPS.forEach(emp=>{if(imported[emp.id])S[emp.id]=Object.assign(ns(),imported[emp.id])});save(false);EMPS.forEach(emp=>{const b=document.getElementById('ebody-'+emp.id);if(b){b.innerHTML=buildBody(emp.id);updProg(emp.id)}});const t=document.getElementById('toast');t.textContent='\u2713 Dados restaurados!';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>{t.classList.remove('show');t.textContent='\u2713 Dados salvos com sucesso'},3000)}catch(err){alert('Erro ao ler arquivo.')}};reader.readAsText(file);event.target.value=''}
function exportar(){const d=new Date().toLocaleDateString('pt-BR');let txt='RELAT\u00d3RIO DE ACOMPANHAMENTO \u2014 SUBS\u00cdDIOS ECON\u00d4MICOS\nAGENCIA DE DESENVOLVIMENTO DO ESTADO DO CEAR\u00c1 \u2014 ADECE\nEmitido em: '+d+'\n'+'\u2550'.repeat(64)+'\n\n';EMPS.forEach(emp=>{const s=S[emp.id];const np=s.nparcelas;txt+='EMPRESA : '+emp.nome.toUpperCase()+'\n';txt+='Processo         : '+(s.nproc||'\u2014')+'\n';txt+='Valor total      : '+(s.valor||'\u2014')+'\n';txt+='Qtd. parcelas    : '+np+'\n';txt+='Valor por parcela: '+(s.vparcela||'\u2014')+'\n';txt+='\nOBSERVA\u00c7\u00d5ES GERAIS:\n'+(s.obs||'\u2014')+'\n';txt+='\nCONTRATO\n  Data: '+(s.contrato.date||'\u2014')+' | Status: '+SL[s.contrato.status]+'\n\n';for(let p=1;p<=np;p++){txt+='  \u2500\u2500 PARCELA '+p+' \u2500\u2500\n';etList(p).forEach((e,i)=>{const es=ge(emp.id,e.id);txt+='    '+(i+1)+'. '+e.nome+'\n       Data: '+(es.date||'\u2014')+' | Status: '+SL[es.status]+'\n       Obs: '+(es.obs||'\u2014')+'\n'});txt+='\n'}txt+='\u2500'.repeat(64)+'\n\n'});const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ADECE_Subsidios_'+new Date().toISOString().slice(0,10)+'.txt';a.click();URL.revokeObjectURL(url)}
load();
const mainEl=document.getElementById('main');
const navEl=document.getElementById('hdr-nav');
EMPS.forEach((emp,idx)=>{
  const nb=document.createElement('button');nb.className='hnav';nb.id='hnav-'+emp.id;
  nb.innerHTML=emp.nome+' <span id="nsub-'+emp.id+'" style="opacity:.65;font-weight:400">0%</span>';
  nb.onclick=()=>document.getElementById('sec-'+emp.id).scrollIntoView({behavior:'smooth'});
  navEl.appendChild(nb);
  const sec=document.createElement('section');sec.className='emp-sec '+emp.cls;sec.id='sec-'+emp.id;
  sec.innerHTML='<div class="emp-hdr"><div class="emp-av">'+emp.sigla+'</div><div class="emp-hdr-info"><div class="emp-hdr-nome">'+emp.nome+'</div><div class="emp-hdr-sub">Subs\u00eddio econ\u00f4mico \u2014 ADECE</div></div><div class="emp-pct" id="epct-'+emp.id+'">0%</div></div><div class="emp-body '+emp.cls+'" id="ebody-'+emp.id+'"></div>';
  mainEl.appendChild(sec);
  if(idx<EMPS.length-1){const hr=document.createElement('hr');hr.className='div-emp';mainEl.appendChild(hr)}
  document.getElementById('ebody-'+emp.id).innerHTML=buildBody(emp.id);
  updProg(emp.id);
});
const obsv=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting){const eid=en.target.id.replace('sec-','');document.querySelectorAll('.hnav').forEach(b=>b.classList.remove('on'));const nb=document.getElementById('hnav-'+eid);if(nb)nb.classList.add('on')}})},{threshold:.2});
EMPS.forEach(e=>{const s=document.getElementById('sec-'+e.id);if(s)obsv.observe(s)});
window.addEventListener('beforeunload',()=>save(false));
</script>
</body>
